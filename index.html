<!DOCTYPE html>
<html>
<head>
    <title>Waste Advisor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center mb-4">♻️ Waste Advisor</h2>

        <form action="/predict" method="POST" enctype="multipart/form-data">
            
            <div class="mb-3">
                <label class="form-label">Describe your waste</label>
                <input type="text" name="text" class="form-control" placeholder="e.g. plastic bottles">
            </div>

            <div class="mb-3">
                <label class="form-label">Upload an image</label>
                <input type="file" name="image" class="form-control">
            </div>

            <button class="btn btn-success w-100">Get Advice</button>
        </form>
    </div>
</div>

</body>
</html>
